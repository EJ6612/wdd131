<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css" >
    <!-- <link rel="stylesheet" href="catalog.css" > -->
    <script src="../menu.js" defer></script>
    <script src="catalog.js" defer></script>
    <title>RC Events</title>
</head>
<body>

    <header>
        <nav>
            <img src="../images/4_w.webp" alt="RC Events logo">
            <button class="menu-btn" type="button">
                <div class="bar1"></div>
                <div class="bar2"></div>
                <div class="bar3"></div>
            </button>
            <a href="../">Home</a>
            <a href="#">Catalog</a>
        </nav>

    </header>

    <main>
        <div class="search-bar">
            <input 
                type="text"
                id="searchInput"
                name="Search Bar"
                placeholder="Search"
            />
            <div class="vl"></div>
            <button id="searchButton" type="button">
                <img src="../images/search.svg" alt="Search Button">
            </button>
        </div>
        <div class="filters">
            <input 
                type="checkbox"
                id="floralCheck"
                name="Floral Filter"
                value="Floral">
            <label for="floralCheck">Floral</label>
            <input 
                type="checkbox"
                id="centerpieceCheck"
                name="Centerpiece Filter"
                value="Centerpiece">
            <label for="centerpieceCheck">Centerpiece</label>
            <input 
                type="checkbox"
                id="seatCheck"
                name="Seat Filter"
                value="Seat">
            <label for="seatCheck">Seat</label>
            <input 
                type="checkbox"
                id="largeCheck"
                name="Large Filter"
                value="Large">
            <label for="largeCheck">Large</label>
        </div>

        <div id="results"></div>

    </main>

    <footer>
        <p>© RC Events</p>
        <img src="../images/4_w.webp" alt="RC Events logo">
        <p>Calgary, Canada</p>
    </footer>
    
</body>
</html>
