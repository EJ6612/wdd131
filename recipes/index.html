
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Find recipes!">
    <meta property="og:url" content="https://ej6612.github.io/wdd131/index.html">
    <meta property="og:image" content="images/twittercard.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Find recipes!">
    <meta name="twitter:image" content="images/twittercard.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <!-- Back to normal stuff -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Elijah Dodge">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="style.css" >
    <!-- <script src="code.js" defer></script> -->
    <title>Recipe Book</title>
</head>
  <body>

    <header>
        <div class="logo-header">
            <img src="images/recipe-book.png">
            <h1>RecipeBook</h1>
        </div>
        <form>
            <div class="search-bar">
                <input 
                    type="text"
                    id="searchInput"
                    name="searchInput"
                    placeholder="Find a recipe"
                />
                <div class="vl"></div>
                <button><img src="images/search.svg"></button>
            </div>
        </form>
        <hr>
    </header>

    <main>
        <article class="food-card">
            <img src="images/apple-crisp.jpg">
            <div class="food-info">
                <h3 class="food-type">dessert</h3>
                <h2 class="food-name">Apple Crisp</h2>
                <p class="food-rating">
                    <span
                    class="rating"
                    role="img"
                    aria-label="Rating: 4 out of 5 stars"
                    >
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>
                </p>
                <p class="food-desc">This apple crisp recipe is a simple yet delicious fall dessert that's great served with warm vanilla ice cream. </p>
            </div>
        </article>
    </main>

    <footer>
        <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
                
        <div class="social">
            <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
            <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
            <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
            <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
        </div>                         
    </footer>

  </body>
</html>
